<!-- Theme toggle: set data-theme BEFORE first paint to prevent flash -->
<script>
(function() {
  var saved = localStorage.getItem('theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>
<link rel="canonical" href="{{ site.url }}{{ page.url }}" />
{% if page.translation_url %}
<link rel="alternate" hreflang="{% if site.locale == 'en' %}de{% else %}en{% endif %}" href="{{ page.translation_url }}" />
<meta name="translation-url" content="{{ page.translation_url }}" />
{% endif %}
{% if page.license %}
<meta name="license" content="{{ page.license }}" />
{% endif %}
